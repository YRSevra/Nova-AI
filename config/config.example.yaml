# Nova Configuration Template
# ─────────────────────────────────────────────────────────────
# STEP 1: Copy this file: cp config.example.yaml config.yaml
# STEP 2: Fill in your API keys below
# STEP 3: config.yaml is git-ignored — your keys stay private
# ─────────────────────────────────────────────────────────────

# ── AI Provider ──────────────────────────────────────────────
ai:
  provider: openai                  # "openai" or "gemini"
  openai_api_key: "sk-YOUR-KEY-HERE"
  gemini_api_key: ""                # Optional: leave blank if using OpenAI
  model: "gpt-4o-mini"             # gpt-4o for best quality, gpt-4o-mini for speed
  max_tokens: 800
  temperature: 0.7

# ── Wake Word ────────────────────────────────────────────────
wake_word:
  engine: "porcupine"               # "porcupine" or "simple" (keyword matching fallback)
  porcupine_access_key: ""          # Get free key at: picovoice.console.ai
  keywords:
    - "hey nova"
    - "nova"
    - "hello nova"
  sensitivity: 0.6                  # 0.0–1.0 (higher = more sensitive, more false triggers)

# ── Speech Recognition ───────────────────────────────────────
speech:
  engine: "whisper"
  whisper_model: "base"             # tiny/base/small/medium/large (larger = more accurate, slower)
  language: "en"
  silence_threshold: 500            # ms of silence before stopping recording
  max_recording_seconds: 15

# ── Voice Output ─────────────────────────────────────────────
voice:
  engine: "macos"                   # "macos" (free, offline) or "elevenlabs" (better quality)
  macos_voice: "Samantha"           # macOS voice name (run `say -v '?' | grep en_` to list)
  macos_rate: 175                   # Words per minute (default ~200, lower = slower)
  elevenlabs_api_key: ""            # Only needed if engine: "elevenlabs"
  elevenlabs_voice_id: ""           # Get from elevenlabs.io

# ── Memory ───────────────────────────────────────────────────
memory:
  db_path: "data/nova_memory.db"
  max_context_messages: 10          # How many messages to keep in conversation context

# ── Nova Personality ─────────────────────────────────────────
personality:
  name: "Nova"
  system_prompt: |
    You are Nova, a smart and caring personal AI assistant for macOS.
    You are helpful, calm, intelligent, and supportive.
    You speak naturally and conversationally — like a knowledgeable friend.
    Keep responses concise unless asked for detail.
    When performing actions (opening apps, files, websites), confirm what you did.
    You help with productivity, coding, assignments, and daily tasks.
    Do not make up information. If unsure, say so clearly.

# ── Logging ──────────────────────────────────────────────────
logging:
  level: "INFO"                     # DEBUG / INFO / WARNING / ERROR
  log_to_file: false
  log_file: "data/nova.log"

# ── User Profile ─────────────────────────────────────────────
user:
  name: "Friend"                    # Nova will use this name when greeting you
  timezone: "Asia/Kolkata"
